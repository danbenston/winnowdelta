name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # This tool is developed and run on Windows, so CI runs on Windows too.
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Types (mypy)
        run: mypy

      - name: Test (pytest)
        run: pytest
